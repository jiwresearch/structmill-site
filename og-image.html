<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      width:1200px;height:630px;
      background:#F5F0E6;
      font-family:"Zilla Slab",Georgia,serif;
      color:#355E3B;
      overflow:hidden;
    }
    .wrap{
      width:100%;height:100%;
      padding:80px 100px;
      display:flex;flex-direction:column;justify-content:space-between;
    }
    .wordmark{
      display:flex;align-items:center;gap:24px;
      font-weight:700;
      font-size:64px;
      letter-spacing:-0.02em;
      line-height:1;
    }
    .wordmark svg{
      width:74px;height:66px;
      flex-shrink:0;
    }
    .hero{
      font-weight:700;
      font-size:140px;
      line-height:0.98;
      letter-spacing:-0.025em;
    }
    .hero span{display:block;}
    .lede{
      font-weight:500;
      font-size:36px;
      color:#3A3A36;
      margin-bottom:24px;
      letter-spacing:-0.01em;
    }
    .tag{
      font-weight:500;
      font-size:36px;
      color:#3A3A36;
      margin-top:24px;
      letter-spacing:-0.01em;
    }
    .foot{
      display:flex;justify-content:space-between;align-items:baseline;
      font-weight:500;font-size:26px;color:#3A3A36;
    }
    .foot .url{font-weight:600;color:#355E3B;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="wordmark">
      <svg viewBox="0 0 36 32" fill="none" stroke="#355E3B" stroke-width="2.5" stroke-linecap="square">
        <line x1="5"  y1="26" x2="29" y2="26"/>
        <line x1="9"  y1="22" x2="27" y2="22"/>
        <line x1="3"  y1="18" x2="31" y2="18"/>
        <line x1="11" y1="14" x2="25" y2="14"/>
        <line x1="7"  y1="10" x2="29" y2="10"/>
      </svg>
      <span>Struct-Mill</span>
    </div>
    <div>
      <div class="lede">$19 billion of lumber.</div>
      <div class="hero">
        <span>Cut. Trucked.</span>
        <span>Thrown away.</span>
      </div>
      <div class="tag">Every year.</div>
    </div>
    <div class="foot">
      <div>The cost of cutting on-site.</div>
      <div class="url">structmill.com</div>
    </div>
  </div>
</body>
</html>
